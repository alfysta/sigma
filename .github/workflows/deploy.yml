name: Deploy SIGMA to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# 🔥 Tambah permissions
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5  # ← Update v4 → v5

      - name: Setup Node.js
        uses: actions/setup-node@v5  # ← Update v4 → v5
        with:
          node-version: 22  # ← Update 20 → 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env.production
        run: |
          echo "VITE_FIREBASE_APIKEY=${{ secrets.VITE_FIREBASE_APIKEY }}" >> .env.production
          echo "VITE_FIREBASE_AUTHDOMAIN=${{ secrets.VITE_FIREBASE_AUTHDOMAIN }}" >> .env.production
          echo "VITE_FIREBASE_DATABASEURL=${{ secrets.VITE_FIREBASE_DATABASEURL }}" >> .env.production
          echo "VITE_FIREBASE_PROJECTID=${{ secrets.VITE_FIREBASE_PROJECTID }}" >> .env.production
          echo "VITE_FIREBASE_STORAGEBUCKET=${{ secrets.VITE_FIREBASE_STORAGEBUCKET }}" >> .env.production
          echo "VITE_FIREBASE_MESSAGINGSENDERID=${{ secrets.VITE_FIREBASE_MESSAGINGSENDERID }}" >> .env.production
          echo "VITE_FIREBASE_APPID=${{ secrets.VITE_FIREBASE_APPID }}" >> .env.production
          echo "VITE_GAS_UPLOAD_URL=${{ secrets.VITE_GAS_UPLOAD_URL }}" >> .env.production

      - name: Build
        run: npm run build -- --mode production

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4  # ← Update v3 → v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
